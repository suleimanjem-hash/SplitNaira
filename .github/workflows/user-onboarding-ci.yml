name: User Onboarding CI

# Validates the full user onboarding path (wallet registration, login, profile
# lookup) on every push/PR that touches the relevant backend or frontend code.
# Keeps the onboarding contract stable and deploy-safe.

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/src/routes/users.ts"
      - "backend/src/schemas/user.schemas.ts"
      - "backend/src/entities/User.ts"
      - "backend/src/services/auth.ts"
      - "backend/src/migrations/**"
      - "backend/src/__tests__/users.test.ts"
      - "frontend/src/hooks/useWallet.ts"
      - "frontend/src/lib/wallet.ts"
      - "frontend/src/components/wallet-provider.tsx"
      - ".github/workflows/user-onboarding-ci.yml"
  pull_request:
    paths:
      - "backend/src/routes/users.ts"
      - "backend/src/schemas/user.schemas.ts"
      - "backend/src/entities/User.ts"
      - "backend/src/services/auth.ts"
      - "backend/src/migrations/**"
      - "backend/src/__tests__/users.test.ts"
      - "frontend/src/hooks/useWallet.ts"
      - "frontend/src/lib/wallet.ts"
      - "frontend/src/components/wallet-provider.tsx"
      - ".github/workflows/user-onboarding-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: user-onboarding-ci-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  # ── 1. Backend: user registration / login / profile routes ────────────────
  backend-onboarding:
    name: Backend — User Onboarding Routes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: splitnaira
          POSTGRES_PASSWORD: splitnaira
          POSTGRES_DB: splitnaira_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U splitnaira -d splitnaira_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CI: "true"
      NODE_ENV: test
      DATABASE_URL: postgresql://splitnaira:splitnaira@localhost:5432/splitnaira_ci
      HORIZON_URL: https://horizon-testnet.stellar.org
      SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
      SOROBAN_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
      CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      SIMULATOR_ACCOUNT: GAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWHF
      NEXT_PUBLIC_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace dependencies
        run: npm ci --no-audit --no-fund

      - name: Run database migrations
        run: npm run migration:run -w backend

      - name: Lint backend
        run: npm run lint -w backend

      - name: Build backend
        run: npm run build -w backend

      - name: Run user onboarding tests
        run: >
          npx vitest run
          src/__tests__/users.test.ts
          src/services/auth.test.ts
          --reporter=verbose
        working-directory: backend

      - name: Run full backend test suite
        run: npm run test -w backend -- --reporter=verbose

  # ── 2. Frontend: wallet connection & onboarding hooks ─────────────────────
  frontend-onboarding:
    name: Frontend — Wallet & Onboarding Hooks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CI: "true"
      NEXT_PUBLIC_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint frontend
        run: npm run lint -w frontend

      - name: Run frontend tests
        run: npm run test -w frontend

      - name: Build frontend
        run: npm run build -w frontend

  # ── 3. Schema contract: user registration payload validation ──────────────
  schema-contract:
    name: Schema Contract — User Registration Payload
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      CI: "true"
      NODE_ENV: test
      DATABASE_URL: postgresql://splitnaira:splitnaira@localhost:5432/splitnaira_ci
      HORIZON_URL: https://horizon-testnet.stellar.org
      SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
      SOROBAN_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
      CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      NEXT_PUBLIC_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace dependencies
        run: npm ci --no-audit --no-fund

      - name: Assert user schema exports are stable
        run: |
          node --input-type=module <<'EOF'
          import { userRegistrationSchema, userResponseSchema, stellarAddressSchema } from './backend/src/schemas/user.schemas.ts';
          // Verify required fields are present in the registration schema
          const shape = userRegistrationSchema.shape;
          if (!shape.walletAddress) { console.error('FAIL: walletAddress missing from userRegistrationSchema'); process.exit(1); }
          console.log('PASS: userRegistrationSchema shape is stable');
          EOF
        continue-on-error: true   # schema shape check is best-effort; full coverage is in unit tests

      - name: Run user schema and auth unit tests
        run: >
          npx vitest run
          src/__tests__/users.test.ts
          --reporter=verbose
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://splitnaira:splitnaira@localhost:5432/splitnaira_ci
          HORIZON_URL: https://horizon-testnet.stellar.org
          SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          SOROBAN_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
          NEXT_PUBLIC_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
